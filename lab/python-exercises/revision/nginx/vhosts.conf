
    server {
            listen 80;
        server_name server1.com
        root /var/www/loc1
        index index.html

        location / {
            try_files $uri $uri / =404;
        }
    }
    server {
            listen 80;
            listen 404;
        server_name server2.com
        root /var/www/loc2
        index index.html

        location / {
            try_files $uri $uri / =404;
        }
    }
    server {
            listen 80;
        server_name server3.com
        root /var/www/loc3
        index index.html

        location / {
            try_files $uri $uri / =404;
        }
    }
